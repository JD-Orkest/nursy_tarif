# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  NursyTarif — Déploiement automatique sur GitHub Pages                  ║
# ║  Déclenché sur chaque push sur la branche main                          ║
# ║  Stratégie : push du build vers la branche gh-pages                     ║
# ║  URL de production : https://jd-orkest.github.io/nursy_tarif            ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: 🚀 Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents:write est nécessaire pour pousser sur la branche gh-pages
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build Nuxt SSG → gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Installer les dépendances
        run: npm ci

      # nuxt generate → .output/public/
      # NUXT_APP_BASE_URL obligatoire pour le sous-répertoire /nursy_tarif/
      - name: 🏗️ Générer le site statique
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /nursy_tarif/

      # Pousse .output/public sur la branche gh-pages
      # peaceiris/actions-gh-pages ajoute automatiquement .nojekyll
      - name: 🌐 Pousser sur la branche gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .output/public
          force_orphan: true
